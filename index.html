  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sand: #f5f0e8;
      --ink: #1a1410;
      --rust: #c4522a;
      --gold: #c9963a;
      --mid: #6b5e4e;
      --checker: rgba(47, 154, 95);
    }

    html,
    body {
      height: 100%;
      background: var(--ink);
      color: var(--sand);
      font-family: 'Courier Prime', monospace;
      overflow-x: hidden;
    }

    /* Animated noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* Rotating big circle */
    .circle-bg {
      position: fixed;
      width: 700px;
      height: 700px;
      border: 1px solid rgba(201, 150, 58, 0.12);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 40s linear infinite;
    }

    .circle-bg::before {
      content: '';
      position: absolute;
      inset: 60px;
      border: 1px solid rgba(201, 150, 58, 0.08);
      border-radius: 50%;
    }

    .circle-bg::after {
      content: '';
      position: absolute;
      inset: 140px;
      border: 1px dashed rgba(196, 82, 42, 0.15);
      border-radius: 50%;
      animation: spin 20s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      opacity: 0.4;
    }

    .corner--tl {
      top: 24px;
      left: 24px;
      border-top: 1px solid var(--gold);
      border-left: 1px solid var(--gold);
    }

    .corner--tr {
      top: 24px;
      right: 24px;
      border-top: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
    }

    .corner--bl {
      bottom: 24px;
      left: 24px;
      border-bottom: 1px solid var(--gold);
      border-left: 1px solid var(--gold);
    }

    .corner--br {
      bottom: 24px;
      right: 24px;
      border-bottom: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
    }

    /* Scanning line */
    .scanline {
      position: fixed;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(201, 150, 58, 0.3), transparent);
      animation: scan 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        top: -5px;
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      95% {
        opacity: 1;
      }

      100% {
        top: 100vh;
        opacity: 0;
      }
    }

    /* Main layout */
    .stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Greeting */
    .greeting {
      font-family: 'Courier Prime', monospace;
      font-size: clamp(10px, 1.4vw, 14px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    /* Big headline */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 10vw, 130px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--sand);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.6s;
    }

    .headline em {
      font-style: italic;
      color: var(--gold);
    }

    /* Divider ornament */
    .ornament {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 2.5rem auto;
      width: min(340px, 90%);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .ornament-line {
      flex: 1;
      height: 1px;
      background: rgba(201, 150, 58, 0.35);
    }

    .ornament-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* Message */
    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 2.2vw, 22px);
      font-style: italic;
      color: rgba(245, 240, 232, 0.75);
      line-height: 1.6;
      max-width: 520px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    /* Status pill */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border: 1px solid rgba(201, 150, 58, 0.3);
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sand);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.5s;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--checker);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    /* Signature */
    .signature {
      margin-top: 4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 2.1s;
    }

    .sig-label {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.5rem;
    }

    .sig-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--sand);
    }

    .sig-name span {
      color: var(--gold);
    }

    /* Typewriter cursor for greeting */
    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.6s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 22px;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background .2s, color .2s, border-color .2s;
      cursor: pointer;
    }

    /* Primary — filled gold */
    .btn--primary {
      background: var(--gold);
      color: var(--ink);
      border: 1px solid var(--gold);
      font-weight: 700;
    }

    .btn--primary:hover {
      background: #d9a846;
      border-color: #d9a846;
    }

    /* Secondary — outlined */
    .btn--outline {
      background: transparent;
      color: var(--sand);
      border: 1px solid rgba(201, 150, 58, 0.35);
    }

    .btn--outline:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Ghost — very subtle */
    .btn--ghost {
      background: transparent;
      color: var(--mid);
      border: 1px solid rgba(107, 94, 78, 0.3);
    }

    .btn--ghost:hover {
      border-color: rgba(201, 150, 58, 0.4);
      color: var(--sand);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      opacity: .8;
    }

    /* Floating specks */
    .speck {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0);
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        opacity: 0;
        transform: translateY(-100vh) translateX(var(--drift, 30px));
      }
    }
  </style>
</head>
